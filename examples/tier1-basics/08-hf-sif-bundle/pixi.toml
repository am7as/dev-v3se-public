[workspace]
name = "hf-sif-bundle"
version = "0.1.0"
description = "Template: HuggingFace model cloned once and baked into a SIF"
authors = ["template contributors <noreply@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]

[dependencies]
python = "3.12.*"
pip = "*"
pytest = "*"

[pypi-dependencies]
hf_sif_bundle = { path = ".", editable = true }
torch        = { version = ">=2.5", index = "https://download.pytorch.org/whl/cu121" }
transformers = ">=4.46"
accelerate   = "*"
sentencepiece = "*"

[tasks]
smoke = "python scripts/smoke.py"
info  = "python scripts/info.py"
infer = "python scripts/infer.py"
test  = "pytest -q tests/"
lint  = "python -m compileall src scripts tests"
