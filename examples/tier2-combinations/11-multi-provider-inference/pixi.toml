[workspace]
name = "infer-multi"
version = "0.1.0"
description = "Template: multi-provider LLM inference"
authors = ["template contributors <noreply@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.12.*"
pip = "*"
pytest = "*"

[pypi-dependencies]
infer_multi = { path = ".", editable = true }
openai      = ">=1.50"
google-genai = ">=0.3"
pyyaml      = "*"

[tasks]
smoke = "python scripts/smoke.py"
info  = "python scripts/info.py"
infer = "python scripts/infer.py"
test  = "pytest -q tests/"
lint  = "python -m compileall src scripts tests"
