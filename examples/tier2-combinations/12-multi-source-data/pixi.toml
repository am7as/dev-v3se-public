[workspace]
name = "data-multi"
version = "0.1.0"
description = "Template: multi-source data (local/cephyr/hf/gcs)"
authors = ["template contributors <noreply@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.12.*"
pip = "*"
pytest = "*"

[pypi-dependencies]
data_multi = { path = ".", editable = true }
pandas     = "*"
datasets   = "*"
pyyaml     = "*"

[tasks]
smoke   = "python scripts/smoke.py"
info    = "python scripts/info.py"
process = "python scripts/process.py"
test    = "pytest -q tests/"
lint    = "python -m compileall src scripts tests"
