[project]
name        = "infer-hf"
description = "V3SE template: HuggingFace model, local in-process inference"

[paths]
data_dir    = "/data"
results_dir = "/results"
models_dir  = "/models"

[hf]
default_model   = "google/gemma-2-2b-it"
# Alvis: always set HF_HOME to avoid $HOME quota hit
hf_home_default = "/workspace/.hf-cache"
