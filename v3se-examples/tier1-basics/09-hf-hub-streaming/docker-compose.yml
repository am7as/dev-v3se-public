services:
  dev:
    build:
      context: ../../_shared/docker
      dockerfile: Dockerfile.dev
    image: hf-hub-streaming:dev
    container_name: hf-hub-streaming-dev
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - .:/workspace
      - ${DATA_HOST:-../data}:/data
      - ${RESULTS_HOST:-../results}:/results
      - ${MODELS_HOST:-../models}:/models
      - pixi_env:/workspace/.pixi
    ports:
      - "${JUPYTER_PORT:-7888}:7888"
    command: sleep infinity
    # Uncomment on a GPU-enabled Docker host:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  pixi_env:
