[workspace]
name = "train-infer"
version = "0.1.0"
description = "V3SE template: LoRA finetune + bundle + inference pipeline"
authors = ["v3se-template contributors <noreply@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.12.*"
pip = "*"

[pypi-dependencies]
train_infer  = { path = ".", editable = true }
torch        = { version = ">=2.5", index = "https://download.pytorch.org/whl/cu121" }
transformers = ">=4.46"
peft         = ">=0.13"
datasets     = ">=3.0"
accelerate   = "*"
trl          = ">=0.11"
wandb        = "*"
mlflow       = "*"

[tasks]
smoke  = "python scripts/smoke.py"
info   = "python scripts/info.py"
train  = "python scripts/train.py"
bundle = "python scripts/bundle.py"
infer  = "python scripts/infer.py"
test   = "pytest -q tests/"
lint   = "python -m compileall src scripts tests"
