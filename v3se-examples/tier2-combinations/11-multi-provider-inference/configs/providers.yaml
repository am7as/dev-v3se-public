# Provider registry — each entry documents what's needed to use that provider.

openai:
  category: premium
  access_way: api_token
  env_required: [OPENAI_API_KEY]
  env_optional: [OPENAI_MODEL, OPENAI_BASE_URL]
  models_suggested:
    - gpt-4o
    - gpt-4o-mini
    - o1-mini

claude_cli:
  category: premium
  access_way: cli_subscription
  env_required: [CLAUDE_CLI_PATH]
  env_optional: [CLAUDE_MODEL]
  models_suggested:
    - claude-sonnet-4-6
    - claude-opus-4-6
  credential_mount_host: "~/.claude"
  credential_mount_container: "/root/.claude"

vllm:
  category: open
  access_way: served_openai_compatible
  env_required: [VLLM_MODEL]
  env_optional: [VLLM_PORT, VLLM_HOST, VLLM_PORT_FILE, VLLM_HOST_FILE]
  alvis_pattern: "launch via slurm/vllm-server.sbatch, client reads port file"
  models_suggested:
    - google/gemma-2-9b-it
    - meta-llama/Llama-3.1-8B-Instruct
    - mistralai/Mistral-7B-Instruct-v0.3
